name: Update Organization Stats

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect org stats and generate visualizations
        uses: actions/github-script@v7
        with:
          # Requires `repo` + `read:org` scopes to access private repos and list org members
          github-token: ${{ secrets.ORG_TOKEN }}
          script: |
            const fs = require('fs');

            const org = 'XylolabsInc';

            // --- Fetch org members dynamically ---
            // Removes hardcoded member list — new members are picked up automatically
            const ORG_MEMBERS = new Set();
            try {
              const members = await github.paginate(github.rest.orgs.listMembers, {
                org, per_page: 100,
              });
              for (const m of members) ORG_MEMBERS.add(m.login);
              console.log(`Org members (${ORG_MEMBERS.size}): ${[...ORG_MEMBERS].join(', ')}`);
            } catch (e) {
              console.warn(`Could not list org members (needs read:org scope): ${e.message}`);
              // If listMembers fails, fall back to listPublicMembers
              try {
                const pub = await github.paginate(github.rest.orgs.listPublicMembers, {
                  org, per_page: 100,
                });
                for (const m of pub) ORG_MEMBERS.add(m.login);
                console.log(`Public members fallback (${ORG_MEMBERS.size}): ${[...ORG_MEMBERS].join(', ')}`);
              } catch (e2) {
                console.warn(`Public members also failed: ${e2.message}`);
              }
            }

            // If member fetch failed entirely, don't filter — include all non-bot contributors
            const isIncluded = (login) => {
              if (!login) return false;
              if (login.includes('[bot]') || login === 'dependabot' || login === 'github-actions') return false;
              return ORG_MEMBERS.size === 0 || ORG_MEMBERS.has(login);
            };

            // Non-programming languages to exclude
            const EXCLUDED_LANGS = new Set([
              'HTML', 'Markdown', 'CSS', 'SCSS', 'Less', 'Sass',
              'JSON', 'YAML', 'TOML', 'XML', 'SVG',
              'Dockerfile', 'Makefile', 'CMake',
              'Rich Text Format', 'Roff', 'TeX', 'Batchfile',
              'Nix', 'Starlark', 'Procfile',
            ]);

            // Color palette for languages
            const LANG_COLORS = {
              TypeScript: '#3178c6', JavaScript: '#f1e05a', Rust: '#dea584',
              Go: '#00add8', Python: '#3572a5', C: '#555555', 'C++': '#f34b7d',
              Java: '#b07219', Ruby: '#701516', Swift: '#f05138',
              Kotlin: '#a97bff', Dart: '#00b4ab', Shell: '#89e051',
              Lua: '#000080', Zig: '#ec915c', Elixir: '#6e4a7e',
              Haskell: '#5e5086', Scala: '#c22d40', PHP: '#4f5d95',
              'C#': '#178600', 'Objective-C': '#438eff', R: '#198ce7',
              Perl: '#0298c3', SQL: '#e38c00', GLSL: '#5686a5',
              Assembly: '#6e4c13', Jupyter: '#f37626', PLpgSQL: '#336790',
            };
            const DEFAULT_COLOR = '#8b8b8b';

            // Contributor colors
            const CONTRIB_COLORS = [
              '#3178c6', '#dea584', '#00add8', '#3572a5', '#f05138',
              '#a97bff', '#f1e05a', '#6e4a7e', '#c22d40', '#178600',
            ];

            // --- Fetch all repos ---
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org, type: 'all', per_page: 100,
            });

            const hasPrivateRepos = repos.some(r => r.private);
            if (!hasPrivateRepos) {
              console.warn('No private repos found — ensure ORG_TOKEN has `repo` scope for private repo access');
            }

            const languageBytes = {};
            const contributorData = {}; // login -> { additions, deletions, commits, avatar }
            const dailyCommits = new Map(); // 'YYYY-MM-DD' -> count (org-wide, default branch)
            const hourlyCommits = Array.from({ length: 7 }, () => new Array(24).fill(0)); // [dow Mon=0..Sun=6][hour 0..23] in KST
            let recentCommits = 0;
            const now = new Date();
            const thirtyDaysAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);
            const oneYearAgo = new Date(now - 365 * 24 * 60 * 60 * 1000);

            // Collect repo info for descriptions section
            const repoInfo = repos.map(r => ({
              name: r.name,
              description: r.description || '',
              isPrivate: r.private,
              language: r.language || '',
              url: r.html_url,
            })).sort((a, b) => a.name.localeCompare(b.name));

            for (const repo of repos) {
              console.log(`Processing ${repo.name}${repo.private ? ' (private)' : ''}...`);

              // 1. Languages — works for private repos if token has `repo` scope
              try {
                const { data: langs } = await github.rest.repos.listLanguages({
                  owner: org, repo: repo.name,
                });
                for (const [lang, bytes] of Object.entries(langs)) {
                  if (!EXCLUDED_LANGS.has(lang)) {
                    languageBytes[lang] = (languageBytes[lang] || 0) + bytes;
                  }
                }
              } catch (e) {
                console.warn(`  listLanguages failed for ${repo.name}: ${e.message}`);
              }

              // 2. listContributors — PRIMARY source for commit counts (reliable, always returns)
              try {
                const contribs = await github.paginate(github.rest.repos.listContributors, {
                  owner: org, repo: repo.name, per_page: 100,
                });
                for (const c of contribs) {
                  if (!isIncluded(c.login)) continue;
                  if (!contributorData[c.login]) {
                    contributorData[c.login] = { additions: 0, deletions: 0, commits: 0, avatar: c.avatar_url || '' };
                  }
                  contributorData[c.login].commits += c.contributions || 0;
                }
              } catch (e) {
                // 404 for empty repos — expected, don't warn
                if (e.status !== 404) {
                  console.warn(`  listContributors failed for ${repo.name}: ${e.message}`);
                }
              }

              // 3. GraphQL commit history — single source of truth for:
              //    - per-contributor additions/deletions (replaces lazy getContributorsStats)
              //    - committedDate-derived 30-day rolling commits (replaces lazy getCommitActivityStats)
              //    - daily activity heatmap data
              //    - per-repo commit totals
              try {
                let cursor = null;
                let hasNext = true;
                let pages = 0;
                while (hasNext) {
                  const result = await github.graphql(`
                    query($owner: String!, $repo: String!, $cursor: String) {
                      repository(owner: $owner, name: $repo) {
                        defaultBranchRef {
                          target {
                            ... on Commit {
                              history(first: 100, after: $cursor) {
                                pageInfo { hasNextPage endCursor }
                                nodes {
                                  additions
                                  deletions
                                  committedDate
                                  author {
                                    user { login avatarUrl }
                                    email
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `, { owner: org, repo: repo.name, cursor });

                  const history = result?.repository?.defaultBranchRef?.target?.history;
                  if (!history) break;

                  for (const c of history.nodes) {
                    const login = c.author?.user?.login;
                    const committedAt = c.committedDate ? new Date(c.committedDate) : null;

                    // Daily activity heatmap + KST weekly punch card: last year window
                    if (committedAt && committedAt >= oneYearAgo) {
                      const dateKey = c.committedDate.slice(0, 10);
                      dailyCommits.set(dateKey, (dailyCommits.get(dateKey) || 0) + 1);

                      const kst = new Date(committedAt.getTime() + 9 * 60 * 60 * 1000);
                      const dow = (kst.getUTCDay() + 6) % 7; // Mon=0..Sun=6
                      hourlyCommits[dow][kst.getUTCHours()]++;
                    }

                    if (!isIncluded(login)) continue;
                    if (!contributorData[login]) {
                      contributorData[login] = {
                        additions: 0, deletions: 0, commits: 0,
                        avatar: c.author?.user?.avatarUrl || '',
                      };
                    } else if (!contributorData[login].avatar && c.author?.user?.avatarUrl) {
                      contributorData[login].avatar = c.author.user.avatarUrl;
                    }
                    contributorData[login].additions += c.additions || 0;
                    contributorData[login].deletions += c.deletions || 0;
                    if (committedAt && committedAt >= thirtyDaysAgo) {
                      recentCommits++;
                    }
                  }

                  hasNext = history.pageInfo.hasNextPage;
                  cursor = history.pageInfo.endCursor;
                  pages++;
                  if (pages > 200) {
                    console.warn(`  ${repo.name}: stopped GraphQL pagination at 200 pages`);
                    break;
                  }
                }
              } catch (e) {
                console.warn(`  GraphQL commit history failed for ${repo.name}: ${e.message}`);
              }
            }

            // Derive totals from contributor data (single source of truth)
            const totalCommits = Object.values(contributorData).reduce((sum, c) => sum + c.commits, 0);
            const contributorCount = Object.keys(contributorData).length;

            // --- Helpers ---
            function formatNum(n) {
              if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
              if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
              return n.toString();
            }

            function escapeXml(s) {
              return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // --- Language SVGs ---
            const sortedLangs = Object.entries(languageBytes)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 10);
            const totalBytes = sortedLangs.reduce((a, [, b]) => a + b, 0);
            const estimatedLoc = Math.round(
              Object.values(languageBytes).reduce((a, b) => a + b, 0) / 40
            );

            function generateLanguageSvg() {
              const barWidth = 400;
              const rowHeight = 32;
              const labelWidth = 110;
              const valueWidth = 70;
              const chartLeft = labelWidth + 8;
              const chartWidth = barWidth - chartLeft - valueWidth;
              const height = sortedLangs.length * rowHeight + 20;
              const maxBytes = sortedLangs[0]?.[1] || 1;

              let rows = '';
              sortedLangs.forEach(([lang, bytes], i) => {
                const y = i * rowHeight + 16;
                const pct = ((bytes / totalBytes) * 100).toFixed(1);
                const w = Math.max(2, (bytes / maxBytes) * chartWidth);
                const color = LANG_COLORS[lang] || DEFAULT_COLOR;
                const loc = formatNum(Math.round(bytes / 40));
                rows += `
                  <text x="${labelWidth}" y="${y}" text-anchor="end" fill="#c9d1d9" font-size="12" font-family="Segoe UI,Helvetica,Arial,sans-serif">${escapeXml(lang)}</text>
                  <rect x="${chartLeft}" y="${y - 10}" width="${w}" height="14" rx="3" fill="${color}" opacity="0.9"/>
                  <text x="${chartLeft + w + 6}" y="${y}" fill="#8b949e" font-size="11" font-family="Segoe UI,Helvetica,Arial,sans-serif">${loc} (${pct}%)</text>`;
              });

              return `<svg xmlns="http://www.w3.org/2000/svg" width="${barWidth}" height="${height}" viewBox="0 0 ${barWidth} ${height}">
                <style>text { dominant-baseline: central; }</style>
                <rect width="100%" height="100%" rx="6" fill="#0d1117"/>
                ${rows}
              </svg>`;
            }

            function generateLangBarSvg() {
              const width = 480;
              const height = 16;
              let x = 0;
              let rects = '';
              for (const [lang, bytes] of sortedLangs) {
                const w = Math.max(1, (bytes / totalBytes) * width);
                const color = LANG_COLORS[lang] || DEFAULT_COLOR;
                rects += `<rect x="${x}" y="0" width="${w}" height="${height}" fill="${color}"/>`;
                x += w;
              }
              return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                <clipPath id="r"><rect width="${width}" height="${height}" rx="4"/></clipPath>
                <g clip-path="url(#r)">${rects}</g>
              </svg>`;
            }

            // --- Contributor SVG ---
            const sortedContribs = Object.entries(contributorData)
              .map(([login, d]) => ({ login, net: d.additions - d.deletions, additions: d.additions, deletions: d.deletions, commits: d.commits }))
              .sort((a, b) => b.commits - a.commits || b.net - a.net);

            function generateContributorSvg() {
              const barWidth = 440;
              const rowHeight = 36;
              const labelWidth = 120;
              const valueWidth = 100;
              const chartLeft = labelWidth + 8;
              const chartWidth = barWidth - chartLeft - valueWidth;
              const height = sortedContribs.length * rowHeight + 20;
              const maxNet = Math.max(1, ...sortedContribs.map(c => c.net));

              let rows = '';
              sortedContribs.forEach((c, i) => {
                const y = i * rowHeight + 18;
                const w = Math.max(2, (Math.max(0, c.net) / maxNet) * chartWidth);
                const color = CONTRIB_COLORS[i % CONTRIB_COLORS.length];
                const netLoc = formatNum(c.net);
                const addLoc = formatNum(c.additions);
                const delLoc = formatNum(c.deletions);
                const commitStr = formatNum(c.commits);
                rows += `
                  <text x="${labelWidth}" y="${y}" text-anchor="end" fill="#c9d1d9" font-size="12" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-weight="600">${escapeXml(c.login)}</text>
                  <rect x="${chartLeft}" y="${y - 10}" width="${w}" height="14" rx="3" fill="${color}" opacity="0.85"/>
                  <text x="${chartLeft + w + 6}" y="${y - 2}" fill="#8b949e" font-size="10" font-family="Segoe UI,Helvetica,Arial,sans-serif">${commitStr} commits · ${netLoc} net</text>
                  <text x="${chartLeft + w + 6}" y="${y + 10}" fill="#3fb950" font-size="9" font-family="Segoe UI,Helvetica,Arial,sans-serif">+${addLoc}</text>
                  <text x="${chartLeft + w + 50}" y="${y + 10}" fill="#f85149" font-size="9" font-family="Segoe UI,Helvetica,Arial,sans-serif">-${delLoc}</text>`;
              });

              return `<svg xmlns="http://www.w3.org/2000/svg" width="${barWidth}" height="${height}" viewBox="0 0 ${barWidth} ${height}">
                <style>text { dominant-baseline: central; }</style>
                <rect width="100%" height="100%" rx="6" fill="#0d1117"/>
                ${rows}
              </svg>`;
            }

            // --- Activity heatmap SVG (52-week × 7-day, GitHub-style) ---
            function generateHeatmapSvg() {
              const cell = 11;
              const gap = 2;
              const weeks = 52;
              const days = 7;
              const padLeft = 28;
              const padTop = 18;
              const padBottom = 24;
              const width = padLeft + weeks * (cell + gap) + 16;
              const height = padTop + days * (cell + gap) + padBottom;

              // Anchor on the last completed Saturday so columns are full weeks.
              const today = new Date(now);
              const dayOfWeek = today.getUTCDay(); // 0=Sun..6=Sat
              const lastSat = new Date(Date.UTC(
                today.getUTCFullYear(), today.getUTCMonth(),
                today.getUTCDate() - ((dayOfWeek + 1) % 7)
              ));
              const startDate = new Date(lastSat);
              startDate.setUTCDate(startDate.getUTCDate() - (weeks * 7 - 1));

              // Pre-compute color scale by quantile
              const counts = [...dailyCommits.values()].filter(v => v > 0).sort((a, b) => a - b);
              const q = (p) => counts.length === 0 ? 0 : counts[Math.min(counts.length - 1, Math.floor(counts.length * p))];
              const t1 = 1, t2 = Math.max(2, q(0.40)), t3 = Math.max(t2 + 1, q(0.70)), t4 = Math.max(t3 + 1, q(0.90));
              const HEAT = ['#161b22', '#0e4429', '#006d32', '#26a641', '#39d353'];
              const bucket = (n) => n === 0 ? 0 : n < t2 ? 1 : n < t3 ? 2 : n < t4 ? 3 : 4;

              let cells = '';
              let monthLabels = '';
              const seenMonths = new Set();
              for (let w = 0; w < weeks; w++) {
                for (let d = 0; d < days; d++) {
                  const cur = new Date(startDate);
                  cur.setUTCDate(cur.getUTCDate() + w * 7 + d);
                  if (cur > today) continue;
                  const key = cur.toISOString().slice(0, 10);
                  const n = dailyCommits.get(key) || 0;
                  const x = padLeft + w * (cell + gap);
                  const y = padTop + d * (cell + gap);
                  cells += `<rect x="${x}" y="${y}" width="${cell}" height="${cell}" rx="2" fill="${HEAT[bucket(n)]}"><title>${key}: ${n} commit${n === 1 ? '' : 's'}</title></rect>`;

                  if (d === 0) {
                    const m = cur.getUTCMonth();
                    if (!seenMonths.has(m)) {
                      seenMonths.add(m);
                      const lbl = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m];
                      monthLabels += `<text x="${x}" y="${padTop - 6}" fill="#8b949e" font-size="10" font-family="Segoe UI,Helvetica,Arial,sans-serif">${lbl}</text>`;
                    }
                  }
                }
              }

              const dayLabels = ['Mon','Wed','Fri'].map((lbl, idx) => {
                const dRow = idx === 0 ? 1 : idx === 1 ? 3 : 5;
                const y = padTop + dRow * (cell + gap) + cell - 1;
                return `<text x="${padLeft - 6}" y="${y}" text-anchor="end" fill="#8b949e" font-size="9" font-family="Segoe UI,Helvetica,Arial,sans-serif">${lbl}</text>`;
              }).join('');

              const legendY = padTop + days * (cell + gap) + 12;
              const legendX = padLeft + weeks * (cell + gap) - (5 * (cell + gap)) - 30;
              const legend = `
                <text x="${legendX - 6}" y="${legendY + cell / 2}" text-anchor="end" fill="#8b949e" font-size="9" font-family="Segoe UI,Helvetica,Arial,sans-serif">Less</text>
                ${HEAT.map((c, i) => `<rect x="${legendX + i * (cell + gap)}" y="${legendY}" width="${cell}" height="${cell}" rx="2" fill="${c}"/>`).join('')}
                <text x="${legendX + 5 * (cell + gap) + 4}" y="${legendY + cell / 2}" fill="#8b949e" font-size="9" font-family="Segoe UI,Helvetica,Arial,sans-serif">More</text>`;

              return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                <style>text { dominant-baseline: central; }</style>
                <rect width="100%" height="100%" rx="6" fill="#0d1117"/>
                ${monthLabels}
                ${dayLabels}
                ${cells}
                ${legend}
              </svg>`;
            }

            // --- Weekly punch card SVG (7 days × 24 hours, KST) ---
            function generatePunchCardSvg() {
              const cellSize = 22;
              const padLeft = 38;
              const padRight = 14;
              const padTop = 14;
              const padBottom = 26;
              const width = padLeft + 24 * cellSize + padRight;
              const height = padTop + 7 * cellSize + padBottom;

              let maxCount = 0;
              for (let d = 0; d < 7; d++) {
                for (let h = 0; h < 24; h++) {
                  if (hourlyCommits[d][h] > maxCount) maxCount = hourlyCommits[d][h];
                }
              }
              const maxR = (cellSize / 2) - 2;
              const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
              const HEAT = ['#0e4429', '#006d32', '#26a641', '#39d353'];
              const colorFor = (ratio) =>
                ratio > 0.66 ? HEAT[3] : ratio > 0.33 ? HEAT[2] : ratio > 0.1 ? HEAT[1] : HEAT[0];

              let cells = '';
              for (let d = 0; d < 7; d++) {
                for (let h = 0; h < 24; h++) {
                  const n = hourlyCommits[d][h];
                  if (n === 0) continue;
                  const ratio = maxCount === 0 ? 0 : n / maxCount;
                  const r = Math.max(1.5, Math.sqrt(ratio) * maxR);
                  const x = padLeft + h * cellSize + cellSize / 2;
                  const y = padTop + d * cellSize + cellSize / 2;
                  cells += `<circle cx="${x}" cy="${y}" r="${r.toFixed(2)}" fill="${colorFor(ratio)}"><title>${dayLabels[d]} ${String(h).padStart(2,'0')}:00 KST · ${n} commit${n === 1 ? '' : 's'}</title></circle>`;
                }
              }

              let yLabels = '';
              for (let d = 0; d < 7; d++) {
                const y = padTop + d * cellSize + cellSize / 2;
                yLabels += `<text x="${padLeft - 8}" y="${y}" text-anchor="end" fill="#8b949e" font-size="10" font-family="Segoe UI,Helvetica,Arial,sans-serif">${dayLabels[d]}</text>`;
              }

              let xLabels = '';
              const labelY = padTop + 7 * cellSize + 12;
              for (let h = 0; h < 24; h += 4) {
                const x = padLeft + h * cellSize + cellSize / 2;
                xLabels += `<text x="${x}" y="${labelY}" text-anchor="middle" fill="#8b949e" font-size="10" font-family="Segoe UI,Helvetica,Arial,sans-serif">${String(h).padStart(2,'0')}</text>`;
              }
              const kstLabel = `<text x="${padLeft + 24 * cellSize + padRight - 2}" y="${labelY}" text-anchor="end" fill="#8b949e" font-size="9" font-family="Segoe UI,Helvetica,Arial,sans-serif">KST</text>`;

              return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                <style>text { dominant-baseline: central; }</style>
                <rect width="100%" height="100%" rx="6" fill="#0d1117"/>
                ${yLabels}
                ${cells}
                ${xLabels}
                ${kstLabel}
              </svg>`;
            }

            // --- Derived velocity metrics ---
            let activeDays = 0;
            for (const v of dailyCommits.values()) if (v > 0) activeDays++;
            const last90Commits = (() => {
              const cutoff = new Date(now - 90 * 24 * 60 * 60 * 1000);
              let sum = 0;
              for (const [k, v] of dailyCommits) {
                if (new Date(k) >= cutoff) sum += v;
              }
              return sum;
            })();
            const avgPerWeek = Math.round((last90Commits / 90) * 7);
            const peakDay = (() => {
              let best = null;
              for (const [k, v] of dailyCommits) {
                if (!best || v > best[1]) best = [k, v];
              }
              return best;
            })();
            // Day-of-week distribution (Mon..Sun) from last-year window
            const dowCounts = [0, 0, 0, 0, 0, 0, 0]; // index: Mon=0..Sun=6
            for (const [k, v] of dailyCommits) {
              const jsDow = new Date(k).getUTCDay(); // Sun=0..Sat=6
              const idx = (jsDow + 6) % 7; // Mon=0..Sun=6
              dowCounts[idx] += v;
            }
            const peakDow = dowCounts.indexOf(Math.max(...dowCounts));
            const peakDowName = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][peakDow];

            // Peak (dow, hour) in KST for punch card caption
            let peakSlot = null;
            for (let d = 0; d < 7; d++) {
              for (let h = 0; h < 24; h++) {
                const n = hourlyCommits[d][h];
                if (!peakSlot || n > peakSlot.n) peakSlot = { d, h, n };
              }
            }
            const peakSlotLabel = peakSlot && peakSlot.n > 0
              ? `${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][peakSlot.d]} ${String(peakSlot.h).padStart(2, '0')}:00 KST (${peakSlot.n} commits)`
              : null;

            // --- Write SVGs ---
            fs.mkdirSync('profile/assets', { recursive: true });
            fs.writeFileSync('profile/assets/languages.svg', generateLanguageSvg());
            fs.writeFileSync('profile/assets/contributors.svg', generateContributorSvg());
            fs.writeFileSync('profile/assets/langbar.svg', generateLangBarSvg());
            fs.writeFileSync('profile/assets/heatmap.svg', generateHeatmapSvg());
            fs.writeFileSync('profile/assets/punchcard.svg', generatePunchCardSvg());

            // --- Build repos markdown section ---
            const publicReposList = repoInfo.filter(r => !r.isPrivate);
            let reposSection = '\n';
            if (publicReposList.length > 0) {
              reposSection += '| Repository | Description | Language |\n';
              reposSection += '|-----------|-------------|----------|\n';
              for (const repo of publicReposList) {
                const lang = repo.language ? `\`${repo.language}\`` : '';
                const desc = repo.description || '';
                reposSection += `| [**${repo.name}**](${repo.url}) | ${desc} | ${lang} |\n`;
              }
            }
            reposSection += '\n';

            // --- Build stats markdown section ---
            const statsDate = now.toISOString().split('T')[0];

            const stats = [
              '',
              `| Metric | Value | Metric | Value |`,
              `|--------|-------|--------|-------|`,
              `| **Estimated LOC** | ${formatNum(estimatedLoc)} | **Active days (1y)** | ${formatNum(activeDays)} |`,
              `| **Total Commits** | ${formatNum(totalCommits)} | **Avg / week (90d)** | ${formatNum(avgPerWeek)} |`,
              `| **Commits (30d)** | ${formatNum(recentCommits)} | **Peak weekday** | ${peakDowName} |`,
              `| **Contributors** | ${contributorCount} | | |`,
              '',
              `#### Languages`,
              '',
              `![Language Bar](assets/langbar.svg)`,
              '',
              `![Languages](assets/languages.svg)`,
              '',
              `#### Activity (last 52 weeks)`,
              '',
              `![Activity Heatmap](assets/heatmap.svg)`,
              '',
              peakDay
                ? `<sub>Peak day: ${peakDay[0]} with ${peakDay[1]} commits.</sub>`
                : '',
              '',
              `#### Weekly Activity Pattern`,
              '',
              `![Weekly Punch Card](assets/punchcard.svg)`,
              '',
              peakSlotLabel
                ? `<sub>Peak hour: ${peakSlotLabel}.</sub>`
                : '',
              '',
              `#### Contributor Insights`,
              '',
              `![Contributors](assets/contributors.svg)`,
              '',
              `<sub>Last updated: ${statsDate}</sub>`,
              '',
            ].join('\n');

            // --- Update README ---
            const readmePath = 'profile/README.md';
            let readme = fs.readFileSync(readmePath, 'utf8');
            readme = readme.replace(
              /<!-- REPOS_START -->[\s\S]*?<!-- REPOS_END -->/,
              `<!-- REPOS_START -->\n${reposSection}<!-- REPOS_END -->`
            );
            readme = readme.replace(
              /<!-- STATS_START -->[\s\S]*?<!-- STATS_END -->/,
              `<!-- STATS_START -->\n${stats}<!-- STATS_END -->`
            );
            fs.writeFileSync(readmePath, readme);

            console.log('\n--- Summary ---');
            console.log(`LOC: ${formatNum(estimatedLoc)}`);
            console.log(`Contributors: ${contributorCount}`);
            console.log(`Total commits: ${formatNum(totalCommits)}`);
            console.log(`Recent commits (30d): ${formatNum(recentCommits)}`);
            console.log(`Languages: ${sortedLangs.map(([l]) => l).join(', ')}`);
            console.log(`Contributors: ${sortedContribs.map(c => `${c.login} (${formatNum(c.commits)} commits, net ${formatNum(c.net)})`).join(', ')}`);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update organization stats"
          git pull --rebase origin main
          git push
