name: Update Organization Stats

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect org stats
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_TOKEN }}
          script: |
            const fs = require('fs');

            const org = 'XylolabsInc';

            // Fetch all repos
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org,
              type: 'all',
              per_page: 100,
            });

            let totalLoc = 0;
            let totalRepos = repos.length;
            let publicRepos = repos.filter(r => !r.private).length;
            let privateRepos = repos.filter(r => r.private).length;
            const languageBytes = {};
            const contributors = new Set();
            let totalCommits = 0;
            let recentCommits = 0;
            const now = new Date();
            const thirtyDaysAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);

            for (const repo of repos) {
              // Languages (bytes of code as LOC proxy)
              try {
                const { data: langs } = await github.rest.repos.listLanguages({
                  owner: org,
                  repo: repo.name,
                });
                for (const [lang, bytes] of Object.entries(langs)) {
                  languageBytes[lang] = (languageBytes[lang] || 0) + bytes;
                  totalLoc += bytes;
                }
              } catch (e) {
                // skip if no access
              }

              // Contributors
              try {
                const contribs = await github.paginate(github.rest.repos.listContributors, {
                  owner: org,
                  repo: repo.name,
                  per_page: 100,
                });
                for (const c of contribs) {
                  if (c.login) contributors.add(c.login);
                  totalCommits += c.contributions || 0;
                }
              } catch (e) {
                // skip
              }

              // Recent commit activity (last 30 days)
              try {
                const { data: activity } = await github.rest.repos.getCommitActivityStats({
                  owner: org,
                  repo: repo.name,
                });
                if (Array.isArray(activity)) {
                  const recent = activity.slice(-5); // last ~5 weeks
                  for (const week of recent) {
                    const weekDate = new Date(week.week * 1000);
                    if (weekDate >= thirtyDaysAgo) {
                      recentCommits += week.total;
                    }
                  }
                }
              } catch (e) {
                // stats may not be ready
              }
            }

            // Top languages by bytes
            const sortedLangs = Object.entries(languageBytes)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 8);
            const totalBytes = Object.values(languageBytes).reduce((a, b) => a + b, 0);

            // Format LOC estimate (bytes / ~40 as rough LOC estimate)
            const estimatedLoc = Math.round(totalBytes / 40);
            function formatNum(n) {
              if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
              if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
              return n.toString();
            }

            // Build language bar
            const langBar = sortedLangs.map(([lang, bytes]) => {
              const pct = ((bytes / totalBytes) * 100).toFixed(1);
              return `\`${lang}\` ${pct}%`;
            }).join(' · ');

            // Build stats section
            const statsDate = now.toISOString().split('T')[0];
            const stats = [
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Repositories** | ${totalRepos} (${publicRepos} public, ${privateRepos} private) |`,
              `| **Estimated LOC** | ${formatNum(estimatedLoc)} |`,
              `| **Total Commits** | ${formatNum(totalCommits)} |`,
              `| **Commits (30d)** | ${formatNum(recentCommits)} |`,
              `| **Contributors** | ${contributors.size} |`,
              '',
              `**Languages:** ${langBar}`,
              '',
              `<sub>Last updated: ${statsDate}</sub>`,
              '',
            ].join('\n');

            // Update README
            const readmePath = 'profile/README.md';
            let readme = fs.readFileSync(readmePath, 'utf8');
            readme = readme.replace(
              /<!-- STATS_START -->[\s\S]*?<!-- STATS_END -->/,
              `<!-- STATS_START -->\n${stats}<!-- STATS_END -->`
            );
            fs.writeFileSync(readmePath, readme);
            console.log('Stats updated successfully');
            console.log(`Repos: ${totalRepos}, LOC: ${formatNum(estimatedLoc)}, Contributors: ${contributors.size}`);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: 📊 update organization stats"
          git push
